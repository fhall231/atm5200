<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>py codes</title>
  <style>
    body { font: 16px/1.45 system-ui, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 16px; }
    input { width: 100%; padding: 10px; font-size: 16px; margin: 12px 0 18px; }
    .item { padding: 10px 0; border-bottom: 1px solid #eee; }
    .meta { color: #666; font-size: 13px; }
  </style>
</head>
<body>
  <h1>Stuff</h1>
  <div class="meta">Shared by link. Not indexed.</div>

  <input id="q" placeholder="Filter…" />

  <div id="list">
    <div class="item">
      <div><a href="./files/py/calc_gibbs.py">calc_gibbs</a></div>
      <div class="meta">Computer vision · Windows</div>
    </div>
  </div>

  <script>
    const q = document.getElementById('q');
    const items = [...document.querySelectorAll('.item')];
    q.addEventListener('input', () => {
      const s = q.value.toLowerCase().trim();
      for (const it of items) it.style.display = it.innerText.toLowerCase().includes(s) ? '' : 'none';
    });
  </script>
</body>
</html>
